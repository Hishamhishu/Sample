<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form action="#" method="post">
        <fieldset>

            <legend>Personal Information</legend>
            <table>
                <tr>
                    <td><label for="name">Name:</label></td>
                    <td><input type="text" id="name" name="name" placeholder="enter your name" required></td>
                </tr>

                <tr>
                    <td><label for="email">Email:</label></td>
                    <td><input type="email" id="email" name="email" placeholder="enter your email" required></td>
                </tr>

                <tr>
                    <td><label for="age">Age:</label></td>
                    <td><input type="number" id="age" name="age" placeholder="enter your age" required></td>
                </tr>

                <tr>
                    <td><label for="mobile">Mobile Number:</label></td>
                    <td><input type="number" id="mobile" name="mobile" placeholder="enter your mobile number" required></td>
                </tr>

           <tr>
        <td><label for="email">Email:</label></td>
        <td><input type="email" id="email" name="email" placeholder="enter your email" required></td>
       </tr>

       <tr>
           <td><label for="age">Age:</label></td>
           <td><input type="number" id="age" name="age" placeholder="enter your age" required></td>
       </tr>
       <tr>
           <td><label for="mobile">Mobile Number:</label></td>
           <td><input type="number" id="mobile" name="mobile" placeholder="enter your mobile number" required></td>
       </tr>

       <tr>
           <td><label for="gender">Gender:</label></td>
           <td>
               <input type="radio" id="male" name="gender" value="male" required>
               <label for="male">Male</label>
               <input type="radio" id="female" name="gender" value="female" required>
               <label for="female">Female</label>
           </td>
       </tr>

       <tr>
           <td><label for="country">Country:</label></td>
           <td>
               <select id="country" name="country" required>
                   <option value="">Select your country</option>
                   <option value="usa">United States</option>
                   <option value="india">India</option>
                   <option value="uk">United Kingdom</option>
               </select>
           </td>
       </tr>

       <tr>
           <td><label for="date">Date of Birth:</label></td>
           <td><input type="date" id="date" name="date" required></td>
       </tr>

       <tr>
           <td><label for="file">Upload your file:</label></td>
           <td><input type="file" id="file" name="file" required></td>
       </tr>

       <tr>
           <td><label for="password">Create your Password:</label></td>
           <td><input type="password" id="password" name="password" placeholder="enter your password" required></td>
       </tr>

       <tr>
           <td><label for="weight">Weight:</label></td>
           <td>
               20<input type="range" id="weight" name="weight" min="20"  max="200" required>200
           </td>
       </tr>
       <tr>
           <td><label for="birth time">Birth Time:</label></td>
           <td><input type="time" id="birth time" name="birth time" required></td>
       </tr>

       <tr>
           <td><label for="paragraph">Additional Information:</label></td>
           <td><textarea id="paragraph" name="paragraph" rows="4" cols="50"></textarea></td>
       </tr>

            </table>

        



        <input type="submit" value="Submit">

        </fieldset>
        
    </form>
</body>
</html>
